experiment:
  domain: "Lunar Lander"
  pretrained_success_rate: 0.0

mlp:
  binary_hidden_layer_sizes: [75, 50, 5]
  ternary_hidden_layer_sizes: [75, 50, 5]
  regressor_hidden_layer_sizes: [100, 40, 2]
  binary_activation: "relu"
  ternary_activation: "relu"
  reg_activation: "tanh"
  binary_alpha: 0.0005
  ternary_alpha: 0.0001
  reg_alpha: 0.00001
  early_stopping: True
  
rl:
  n_episodes: 200
  algorithm: "DQN"
  steps: 700
  action_space: 4
  observation_space: 11