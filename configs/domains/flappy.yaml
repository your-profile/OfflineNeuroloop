experiment:
  domain: "Flappy Bird"    
  pretrained_success_rate: 0.0

mlp:
  binary_hidden_layer_sizes: [15, 8, 2]
  ternary_hidden_layer_sizes: [25, 15, 3]
  regressor_hidden_layer_sizes: [25, 15, 2]
  clf_activation: "relu"
  reg_activation: "tanh"
  
rl:
  n_episodes: 1
  algorithm: "DQN"
  steps: 1000
  action_space: 2
  observation_space: 12
